<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ebook</title>
  <link rel="stylesheet" href="./assets/style/index.css">
</head>
<body>
  <main>
    
  </main>
  <section class="main-foot">
    <div class="move-page-wrap">
      <button class="prev"></button>
      <p class="now-page" tabindex="0"></p>
      <span class="slash">/</span>
      <p class="total-page" tabindex="0"></p>
      <button class="next"></button>
    </div>
    <div class="search-wrapper">
      <div class="page-search-wrap search-wrap">
        <div class="page-input">
          <label>페이지 입력 :</label>
          <input type="number" id="page-search" class="search-input" min="1">
          <button class="reset page-reset"></button>
        </div>
        <button class="page-search-btn search-btn">이동</button>
      </div>
      <span class="divider"></span>
      <div class="word-search-wrap search-wrap">
        <div class="word-input">
          <label>검색할 단어 입력 :</label>
          <input type="text" id="word-search" class="search-input">
          <button class="reset word-reset"></button>
        </div>
        <button class="word-search-btn search-btn" type="button">검색</button>
        <button class="word-prev-btn search-btn hide" type="button" title="이전">↑</button>
        <button class="word-next-btn search-btn hide" type="button" title="다음">↓</button>
      </div>
      <div class="count hide">
        <span class="current-num">0</span>
        <span class="">/</span>
        <span class="total-num">0</span>
      </div>
    </div>
  </section>
  <script src="./assets/js/visibility.js"></script>
  <script src="./assets/js/pages.js"></script>
  <script src="./assets/js/navigate.js"></script>
  <script src="./assets/js/searchPage.js"></script>
  <script src="./assets/js/searchWord.js"></script>
</body>
</html>
